<svg width="360" height="800" viewBox="0 0 360 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <linearGradient id="lane_grad" x1="180" y1="0" x2="180" y2="800" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00F5FF" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#00F5FF" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="360" height="800" fill="#050816"/>
  
  <!-- 3-Lane Grid -->
  <path d="M120 0V800M240 0V800" stroke="url(#lane_grad)" stroke-width="2" stroke-dasharray="10 5"/>
  <path d="M0 100H360M0 200H360M0 300H360M0 400H360M0 500H360M0 600H360M0 700H360" stroke="#00F5FF" stroke-opacity="0.05" stroke-width="1"/>

  <!-- HUD: Glassmorphism -->
  <g id="HUD_Top">
    <rect x="20" y="20" width="320" height="60" rx="10" fill="white" fill-opacity="0.05"/>
    <rect x="20.5" y="20.5" width="319" height="59" rx="9.5" stroke="#00F5FF" stroke-opacity="0.3"/>
    <text x="40" y="55" fill="white" font-family="monospace" font-size="20" font-weight="bold" letter-spacing="0.1em">CLASSIC LANE</text>
    <text x="320" y="55" text-anchor="end" fill="#7CFF4F" font-family="monospace" font-size="16">LVL 12</text>
  </g>

  <!-- Left Lane: Count Buffs -->
  <g id="Lane_Left_Buffs">
    <rect x="15" y="250" width="90" height="50" rx="4" fill="#00F5FF" fill-opacity="0.1"/>
    <rect x="15.5" y="250.5" width="89" height="49" rx="3.5" stroke="#00F5FF" stroke-width="2" filter="url(#glow)"/>
    <text x="60" y="285" text-anchor="middle" fill="#00F5FF" font-family="monospace" font-size="24" font-weight="bold">+15</text>
    
    <rect x="15" y="450" width="90" height="50" rx="4" fill="#00F5FF" fill-opacity="0.1"/>
    <rect x="15.5" y="450.5" width="89" height="49" rx="3.5" stroke="#00F5FF" stroke-width="2"/>
    <text x="60" y="485" text-anchor="middle" fill="#00F5FF" font-family="monospace" font-size="24" font-weight="bold">+20</text>
  </g>

  <!-- Center Lane: Monsters -->
  <g id="Lane_Center_Monsters">
    <path d="M180 320L195 350H165L180 320Z" fill="#FF4F4F" filter="url(#glow)"/>
    <circle cx="180" cy="338" r="4" fill="white"/>
    
    <path d="M180 180L195 210H165L180 180Z" fill="#FF4F4F" fill-opacity="0.6"/>
  </g>

  <!-- Right Lane: Quality Buffs -->
  <g id="Lane_Right_Buffs">
    <rect x="255" y="350" width="90" height="50" rx="4" fill="#FF00FF" fill-opacity="0.1"/>
    <rect x="255.5" y="350.5" width="89" height="49" rx="3.5" stroke="#FF00FF" stroke-width="2" filter="url(#glow)"/>
    <text x="300" y="385" text-anchor="middle" fill="#FF00FF" font-family="monospace" font-size="24" font-weight="bold">x2</text>
    
    <text x="300" y="415" text-anchor="middle" fill="#FF00FF" font-family="monospace" font-size="10" font-weight="bold">FIRE RATE</text>
  </g>

  <!-- Player: Hero (Positioned in Center Lane) -->
  <g id="Player_Hero">
    <circle cx="180" cy="720" r="45" stroke="#7CFF4F" stroke-width="1" stroke-dasharray="2 6"/>
    <path d="M180 685L205 735H155L180 685Z" fill="#7CFF4F"/>
    <rect x="175" y="715" width="10" height="10" fill="#00F5FF">
      <animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite" />
    </rect>
  </g>

  <!-- Bottom UI Accents -->
  <path d="M0 780H360" stroke="#00F5FF" stroke-width="4" stroke-opacity="0.3"/>
</svg>
