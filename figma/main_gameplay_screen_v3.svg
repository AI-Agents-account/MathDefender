<svg width="360" height="800" viewBox="0 0 360 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="hub_glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="360" height="800" fill="#050816"/>

  <!-- Radial Cyber Grids -->
  <g id="Radial_Grids" stroke="#00F5FF" stroke-opacity="0.15">
    <path d="M180 800C180 600 0 400 0 0" fill="none"/>
    <path d="M180 800C180 600 360 400 360 0" fill="none"/>
    <path d="M180 800V0" fill="none" stroke-opacity="0.3" stroke-dasharray="5 5"/>
    
    <circle cx="180" cy="800" r="200" fill="none" stroke-opacity="0.1"/>
    <circle cx="180" cy="800" r="400" fill="none" stroke-opacity="0.05"/>
    <circle cx="180" cy="800" r="600" fill="none" stroke-opacity="0.02"/>
  </g>

  <!-- Safe Zone Hub -->
  <g id="Safe_Zone">
    <circle cx="180" cy="720" r="80" fill="#7CFF4F" fill-opacity="0.03" stroke="#7CFF4F" stroke-opacity="0.2" stroke-width="2" stroke-dasharray="10 10">
      <animateTransform attributeName="transform" type="rotate" from="0 180 720" to="360 180 720" dur="10s" repeatCount="indefinite" />
    </circle>
    <circle cx="180" cy="720" r="50" stroke="#7CFF4F" stroke-opacity="0.5" filter="url(#hub_glow)"/>
  </g>

  <!-- Orbiting Buff Pods -->
  <g id="Buff_Pods">
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0 180 720" to="360 180 720" dur="6s" repeatCount="indefinite" />
      <circle cx="180" cy="620" r="15" fill="#00F5FF" fill-opacity="0.2" stroke="#00F5FF" stroke-width="2"/>
      <text x="180" y="625" text-anchor="middle" fill="white" font-family="monospace" font-size="12" font-weight="bold">x3</text>
    </g>
    <g>
      <animateTransform attributeName="transform" type="rotate" from="120 180 720" to="480 180 720" dur="8s" repeatCount="indefinite" />
      <circle cx="180" cy="620" r="15" fill="#FF00FF" fill-opacity="0.2" stroke="#FF00FF" stroke-width="2"/>
      <text x="180" y="625" text-anchor="middle" fill="white" font-family="monospace" font-size="12" font-weight="bold">+50</text>
    </g>
  </g>

  <!-- Converging Monsters -->
  <g id="Monsters">
    <path d="M40 100L50 120H30L40 100Z" fill="#FF4F4F"/>
    <path d="M320 100L330 120H310L320 100Z" fill="#FF4F4F"/>
    <path d="M180 50L190 70H170L180 50Z" fill="#FF4F4F" filter="url(#hub_glow)"/>
  </g>

  <!-- Player Hero -->
  <g id="Player_Hero">
    <path d="M180 690L200 730H160L180 690Z" fill="#7CFF4F"/>
    <rect x="176" y="715" width="8" height="8" fill="#00F5FF"/>
  </g>

  <!-- Top Info HUD -->
  <rect x="100" y="20" width="160" height="40" rx="20" fill="white" fill-opacity="0.05" stroke="#00F5FF" stroke-opacity="0.3"/>
  <text x="180" y="45" text-anchor="middle" fill="#00F5FF" font-family="monospace" font-size="14" font-weight="bold" letter-spacing="0.1em">RADIAL MODE</text>
</svg>
