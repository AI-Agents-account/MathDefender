<svg width="360" height="800" viewBox="0 0 360 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="360" height="800" fill="#050816"/>
  
  <!-- Cyber Grid / Lane -->
  <path d="M40 0L20 800M320 0L340 800" stroke="#00F5FF" stroke-opacity="0.2" stroke-width="1"/>
  <path d="M0 200H360M0 400H360M0 600H360" stroke="#00F5FF" stroke-opacity="0.1" stroke-width="1"/>

  <!-- Top HUD: Score Panel -->
  <g id="HUD_Score">
    <rect x="20" y="20" width="140" height="50" rx="8" fill="white" fill-opacity="0.05"/>
    <rect x="20.5" y="20.5" width="139" height="49" rx="7.5" stroke="#00F5FF" stroke-opacity="0.5"/>
    <text x="35" y="40" fill="#00F5FF" font-family="monospace" font-size="10" letter-spacing="0.1em">SCORE</text>
    <text x="35" y="60" fill="white" font-family="monospace" font-size="18" font-weight="bold">004250</text>
  </g>

  <!-- Top HUD: Multiplier Panel -->
  <g id="HUD_Multiplier">
    <rect x="200" y="20" width="140" height="50" rx="8" fill="white" fill-opacity="0.05"/>
    <rect x="200.5" y="20.5" width="139" height="49" rx="7.5" stroke="#FF00FF" stroke-opacity="0.5"/>
    <text x="215" y="40" fill="#FF00FF" font-family="monospace" font-size="10" letter-spacing="0.1em">MULTIPLIER</text>
    <text x="215" y="60" fill="white" font-family="monospace" font-size="18" font-weight="bold">x1.5</text>
  </g>

  <!-- Center-Top: Wave Status -->
  <g id="Wave_Status">
    <text x="180" y="110" text-anchor="middle" fill="#7CFF4F" font-family="monospace" font-size="24" font-weight="bold" letter-spacing="0.2em">WAVE 05</text>
    <path d="M110 120H250" stroke="#7CFF4F" stroke-width="2" stroke-linecap="round" stroke-dasharray="4 4"/>
  </g>

  <!-- Math Gates (Floating) -->
  <g id="Gate_Left">
    <rect x="50" y="300" width="110" height="60" rx="4" fill="#00F5FF" fill-opacity="0.1"/>
    <rect x="50.5" y="300.5" width="109" height="59" rx="3.5" stroke="#00F5FF" stroke-width="2"/>
    <text x="105" y="340" text-anchor="middle" fill="#00F5FF" font-family="monospace" font-size="28" font-weight="bold">x2</text>
  </g>

  <g id="Gate_Right">
    <rect x="200" y="300" width="110" height="60" rx="4" fill="#FF00FF" fill-opacity="0.1"/>
    <rect x="200.5" y="300.5" width="109" height="59" rx="3.5" stroke="#FF00FF" stroke-width="2"/>
    <text x="255" y="340" text-anchor="middle" fill="#FF00FF" font-family="monospace" font-size="28" font-weight="bold">+10</text>
  </g>

  <!-- Player: Cyber-Hero Placeholder -->
  <g id="Player_Hero">
    <!-- Outer Glow / Shield -->
    <circle cx="180" cy="720" r="45" stroke="#7CFF4F" stroke-width="1" stroke-dasharray="2 6"/>
    <!-- Hero Body -->
    <path d="M180 685L205 735H155L180 685Z" fill="#7CFF4F"/>
    <path d="M180 695L195 730H165L180 695Z" fill="#050816"/>
    <!-- Core -->
    <rect x="175" y="715" width="10" height="10" fill="#00F5FF">
      <animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite" />
    </rect>
  </g>

  <!-- Bottom UI Accents -->
  <path d="M0 780H360" stroke="#00F5FF" stroke-width="4" stroke-opacity="0.3"/>
  <rect x="140" y="785" width="80" height="4" rx="2" fill="#00F5FF"/>
</svg>
